<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>근골격계 질환 업무관련성 평가 및 특별진찰 소견서 작성 도우미</title>
  <link rel="icon" href="./icon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <!--
    윈도7 구형 크롬 호환 폴리필. 모듈 번들(type=module, defer)보다 먼저 실행되도록
    클래식 인라인 스크립트로 <head>에 둔다. 코드는 ES2015 문법만 사용하므로
    트랜스파일 없이도 구형 크롬에서 동작한다.
    대상 결손 API(Chrome 버전): Array/String.prototype.at(92+), Object.hasOwn(93+),
    Array.prototype.findLast/findLastIndex(97+), structuredClone(98+).
  -->
  <script>
  (function () {
    function atPolyfill(n) {
      n = Math.trunc(n) || 0;
      if (n < 0) n += this.length;
      if (n < 0 || n >= this.length) return undefined;
      return this[n];
    }
    function define(proto, name, value) {
      if (proto && !proto[name]) {
        Object.defineProperty(proto, name, { value: value, writable: true, enumerable: false, configurable: true });
      }
    }
    define(Array.prototype, 'at', atPolyfill);
    define(String.prototype, 'at', atPolyfill);
    var TA = Object.getPrototypeOf(Uint8Array.prototype);
    define(TA, 'at', atPolyfill);
    if (!Object.hasOwn) {
      Object.defineProperty(Object, 'hasOwn', {
        value: function (obj, prop) {
          if (obj == null) throw new TypeError('Cannot convert undefined or null to object');
          return Object.prototype.hasOwnProperty.call(Object(obj), prop);
        },
        writable: true, enumerable: false, configurable: true
      });
    }
    define(Array.prototype, 'findLast', function (predicate, thisArg) {
      for (var i = this.length - 1; i >= 0; i--) {
        if (predicate.call(thisArg, this[i], i, this)) return this[i];
      }
      return undefined;
    });
    define(Array.prototype, 'findLastIndex', function (predicate, thisArg) {
      for (var i = this.length - 1; i >= 0; i--) {
        if (predicate.call(thisArg, this[i], i, this)) return i;
      }
      return -1;
    });
    if (typeof window.structuredClone !== 'function') {
      window.structuredClone = function (value) {
        return value == null ? value : JSON.parse(JSON.stringify(value));
      };
    }
  })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
