version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      react:
        patterns:
          - "react"
          - "react-dom"
      electron:
        patterns:
          - "electron"
          - "electron-builder"
      typescript-tooling:
        patterns:
          - "typescript"
          - "vitest"
          - "@types/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
